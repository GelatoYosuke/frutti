<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frutti</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4ead5;--bg2:#ede1c9;--card:rgba(60,50,38,0.06);
  --card-h:rgba(60,50,38,0.12);--text:#3d3226;--soft:#6b5a46;
  --dim:#9a8872;--green:#5a8a4a;--green-bg:rgba(90,138,74,0.12);
  --red:#b85450;--red-bg:rgba(184,84,80,0.1);
  --gold:#b8860b;--gold-bg:rgba(184,134,11,0.12);
  --serif:'Noto Serif JP',serif;--sans:'Zen Kaku Gothic New',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body{display:flex;justify-content:center;padding:0}
#game{width:100%;max-width:420px;min-height:100dvh;padding:16px 16px 32px;position:relative}
.scene{display:none;opacity:0;transition:opacity 0.4s}.scene.active{display:block;opacity:1}

.nakanoko{text-align:center;margin:0 auto 8px;position:relative}
.nakanoko img{max-width:200px;height:auto;border-radius:8px;transition:all 0.5s ease}
.nakanoko img.big{max-width:240px}
.nakanoko img.small{max-width:140px}
.nakanoko img.title-img{max-width:320px;border-radius:12px}

.speech{
  font-family:var(--serif);color:var(--soft);font-size:14px;
  line-height:1.8;text-align:center;min-height:2.8em;
  padding:8px 16px;margin:0 auto 16px;max-width:320px;
}
.speech .dot{color:var(--dim)}

.var-name{
  font-family:var(--serif);font-size:28px;font-weight:700;
  color:var(--text);text-align:center;margin:16px 0 4px;letter-spacing:0.04em;
}
.var-reading{font-size:12px;color:var(--dim);text-align:center;margin-bottom:20px}
.q-label{font-size:13px;color:var(--dim);text-align:center;margin-bottom:12px;letter-spacing:0.05em}

.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ch-btn{
  background:white;border:1px solid rgba(60,50,38,0.12);border-radius:10px;
  padding:13px 18px;color:var(--text);font-family:var(--sans);font-size:15px;
  font-weight:500;cursor:pointer;transition:all 0.15s;text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.ch-btn:active{transform:scale(0.98)}
.ch-btn:hover{background:var(--bg2);border-color:rgba(60,50,38,0.2)}
.ch-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.ch-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.ch-btn.dis{pointer-events:none;opacity:0.45}
.ch-btn.show{border-color:var(--green);opacity:0.6}

.m-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px}
.m-btn{
  background:white;border:1px solid rgba(60,50,38,0.12);border-radius:8px;
  padding:11px 6px;color:var(--text);font-family:var(--sans);font-size:14px;
  font-weight:500;cursor:pointer;transition:all 0.15s;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.m-btn:active{transform:scale(0.95)}
.m-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.m-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.m-btn.close{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.m-btn.dis{pointer-events:none;opacity:0.45}
.m-btn.show{border-color:var(--green);opacity:0.6}

.hint-area{text-align:center;margin-top:4px}
.hint-btn{
  background:none;border:1px dashed var(--dim);border-radius:20px;
  padding:7px 18px;color:var(--dim);font-size:12px;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.hint-btn:hover{border-color:var(--soft);color:var(--soft)}
.hint-btn:disabled{opacity:0.3;cursor:default}

.prog{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.prog-dot{
  width:8px;height:8px;border-radius:50%;background:rgba(60,50,38,0.1);
  border:1px solid var(--dim);transition:all 0.3s;
}
.prog-dot.ok{background:var(--green);border-color:var(--green)}
.prog-dot.ng{background:var(--red);border-color:var(--red)}
.prog-dot.cur{background:var(--gold);border-color:var(--gold);transform:scale(1.3)}

.sc-disp{text-align:right;font-size:12px;color:var(--dim);margin-bottom:12px}
.sc-disp span{color:var(--gold);font-weight:700}

.nxt-btn{
  display:block;width:100%;background:white;border:1px solid rgba(60,50,38,0.15);
  border-radius:10px;padding:14px;color:var(--text);font-family:var(--sans);
  font-size:15px;font-weight:500;cursor:pointer;transition:all 0.15s;margin-top:16px;
  -webkit-tap-highlight-color:transparent;
}
.nxt-btn:hover{background:var(--bg2)}

.title-top{text-align:center;padding-top:24px;margin-bottom:16px}
.title-label{font-size:10px;color:var(--dim);letter-spacing:0.15em;margin-bottom:12px}
.title-main{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--text);letter-spacing:0.08em;margin-bottom:4px}
.title-sub{font-size:13px;color:var(--dim)}

.start-btn{
  display:block;width:100%;background:var(--text);border:none;border-radius:12px;
  padding:16px;color:var(--bg);font-family:var(--serif);font-size:16px;
  font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.08em;
  -webkit-tap-highlight-color:transparent;
}
.start-btn:hover{opacity:0.85}
.start-btn:active{transform:scale(0.98)}

.howto{
  margin:16px 0;padding:14px 16px;background:rgba(60,50,38,0.04);
  border-radius:10px;font-size:13px;line-height:1.8;color:var(--soft);
}
.howto p{margin-bottom:6px}.howto p:last-child{margin-bottom:0}
.db-c{text-align:center;font-size:11px;color:var(--dim);margin-top:12px;opacity:0.6}

.r-header{text-align:center;margin-bottom:24px;padding-top:8px}
.r-score{font-family:var(--serif);font-size:44px;font-weight:700;color:var(--gold);margin:4px 0}
.r-label{font-size:12px;color:var(--dim)}

.r-item{
  background:white;border-radius:8px;padding:12px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:10px;border:1px solid rgba(60,50,38,0.06);
}
.r-icon{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;flex-shrink:0;
}
.r-icon.ok{background:var(--green-bg);color:var(--green)}
.r-icon.ng{background:var(--red-bg);color:var(--red)}
.r-icon.pt{background:var(--gold-bg);color:var(--gold)}
.r-info{flex:1;min-width:0}
.r-name{font-weight:500;font-size:13px;color:var(--text)}
.r-ans{font-size:11px;color:var(--dim);margin-top:2px}
.r-pts{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.s-info{font-size:12px;color:var(--soft);text-align:center;margin-top:8px;line-height:1.6}
.s-info strong{color:var(--gold);font-weight:500}
.diff{display:inline-block;font-size:9px;padding:2px 6px;border-radius:8px;margin-left:4px;vertical-align:middle}
.d1{background:var(--green-bg);color:var(--green)}
.d2{background:var(--gold-bg);color:var(--gold)}
.d3{background:var(--red-bg);color:var(--red)}
.d4{background:rgba(140,90,170,0.12);color:#8c5aaa}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeUp 0.35s ease-out forwards}
.fi2{animation:fadeUp 0.35s ease-out 0.12s forwards;opacity:0}
.fi3{animation:fadeUp 0.35s ease-out 0.24s forwards;opacity:0}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s ease-in-out}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop 0.3s ease-out}

/* ===== ファミコン風タイトルアニメーション ===== */
/* タイトル文字が一文字ずつカクッと上下する */
@keyframes titleBob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
.title-main span{
  display:inline-block;
  animation:titleBob 1.2s steps(2,end) infinite;
}
.title-main span:nth-child(1){animation-delay:0s}
.title-main span:nth-child(2){animation-delay:0.2s}
.title-main span:nth-child(3){animation-delay:0.4s}
.title-main span:nth-child(4){animation-delay:0.6s}
.title-main span:nth-child(5){animation-delay:0.8s}
.title-main span:nth-child(6){animation-delay:1s}

/* なかの子がゆっくりカクッと呼吸する */
@keyframes charBreathe{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
.title-img{
  animation:charBreathe 2s steps(2,end) infinite;
}

/* タイトル画像：2枚重ねて蓋が開いたり閉じたりの切替アニメーション */
.title-img-wrap{
  position:relative;display:inline-block;line-height:0;
}
.title-img-wrap img{
  max-width:320px;height:auto;border-radius:12px;display:block;
}
.title-img-wrap img.closed{position:relative}
.title-img-wrap img.open{
  position:absolute;top:0;left:0;opacity:0;
  animation:lidOpenClose 7s steps(1,end) infinite;
}
@keyframes lidOpenClose{
  0%,60%{opacity:0}          /* 閉じている */
  63%{opacity:1}             /* パカッ！と開く */
  90%{opacity:1}             /* 開いたまま */
  93%{opacity:0}             /* パタンと閉じる */
  100%{opacity:0}
}

/* 「はじめる」ボタンが点滅（ファミコンのPRESS STARTっぽく） */
@keyframes blink{
  0%,49%{opacity:1}
  50%,100%{opacity:0.4}
}
.start-btn{animation:blink 1s steps(1,end) infinite}
.start-btn:hover{animation:none;opacity:1}

/* ドット（パーティクル）がふわふわ流れる */
.dots-bg{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;overflow:hidden;z-index:0;
}
.pixel-dot{
  position:absolute;width:4px;height:4px;
  background:var(--gold);opacity:0.3;
  animation:floatUp 8s steps(16,end) infinite;
}
@keyframes floatUp{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:0.4}
  90%{opacity:0.3}
  100%{transform:translateY(-20px);opacity:0}
}
#s-title{position:relative;z-index:1}
#s-title>*{position:relative;z-index:2}

.mute-btn{
  position:fixed;top:12px;right:12px;width:36px;height:36px;
  border-radius:50%;background:rgba(60,50,38,0.1);border:1px solid rgba(60,50,38,0.15);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:16px;color:var(--soft);z-index:100;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.mute-btn:hover{background:rgba(60,50,38,0.15)}
.mute-btn:active{transform:scale(0.92)}

/* ===== ハイスコア・統計 ===== */
.stats-box{
  display:flex;gap:8px;margin:12px 0;
}
.stat-card{
  flex:1;background:rgba(60,50,38,0.06);border-radius:10px;
  padding:10px 8px;text-align:center;
}
.stat-label{font-size:10px;color:var(--dim);letter-spacing:0.05em;margin-bottom:2px}
.stat-val{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold)}
.stat-val.small{font-size:16px}

/* ===== 図鑑画面 ===== */
.zukan-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-top:4px;
}
.zukan-title{
  font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);
  letter-spacing:0.05em;
}
.zukan-count{font-size:12px;color:var(--dim)}
.back-btn{
  background:none;border:1px solid rgba(60,50,38,0.15);border-radius:8px;
  padding:6px 12px;color:var(--soft);font-size:12px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.back-btn:active{transform:scale(0.95)}

.zukan-cat{
  margin-bottom:16px;background:white;border-radius:10px;padding:12px;
  border:1px solid rgba(60,50,38,0.06);
}
.zukan-cat-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed rgba(60,50,38,0.12);
}
.zukan-cat-name{
  font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);
}
.zukan-cat-count{font-size:11px;color:var(--dim)}

.zukan-varieties{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
  gap:4px 6px;
}
.zukan-v{
  font-size:11px;padding:4px 6px;border-radius:6px;
  color:var(--text);background:var(--green-bg);
  text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.zukan-v.new{
  background:var(--gold-bg);color:var(--gold);
  animation:newVariety 0.5s steps(2,end);
}
.zukan-v.locked{
  background:rgba(60,50,38,0.04);color:var(--dim);opacity:0.5;
}
@keyframes newVariety{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}

.zukan-link{
  display:block;text-align:center;margin:10px 0 20px;
  font-size:12px;color:var(--dim);text-decoration:underline;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.zukan-link:hover{color:var(--soft)}

/* 新品種バッジ */
.new-badge{
  display:inline-block;background:var(--gold);color:white;
  font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;
  font-weight:700;letter-spacing:0.05em;
}

/* 結果画面のNEW表示 */
.r-new{
  display:inline-block;background:var(--gold);color:white;
  font-size:8px;padding:1px 4px;border-radius:3px;margin-left:4px;
  font-weight:700;vertical-align:middle;
}

/* 結果画面の品種アイテムをタップ可能に */
.r-item{cursor:pointer;-webkit-tap-highlight-color:transparent}
.r-item:active{transform:scale(0.98)}
.r-item::after{
  content:'›';margin-left:4px;color:var(--dim);font-size:18px;flex-shrink:0;
}
/* 図鑑の品種もタップ可能に */
.zukan-v:not(.locked){cursor:pointer;-webkit-tap-highlight-color:transparent}
.zukan-v:not(.locked):active{transform:scale(0.96)}

/* ===== 詳細モーダル ===== */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(30,20,12,0.6);display:none;
  align-items:center;justify-content:center;
  z-index:200;padding:20px;
  -webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
  animation:fadeIn 0.2s ease-out;
}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}

.modal{
  background:var(--bg);border-radius:16px;padding:24px 20px 20px;
  max-width:360px;width:100%;max-height:80vh;overflow-y:auto;
  border:1px solid rgba(60,50,38,0.15);
  animation:modalIn 0.25s ease-out;position:relative;
}
.modal-close{
  position:absolute;top:12px;right:12px;width:28px;height:28px;
  border-radius:50%;background:rgba(60,50,38,0.1);border:none;
  color:var(--soft);font-size:16px;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.modal-close:active{transform:scale(0.9)}

.modal-cat{
  font-size:11px;color:var(--dim);letter-spacing:0.1em;margin-bottom:2px;
}
.modal-name{
  font-family:var(--serif);font-size:24px;font-weight:700;
  color:var(--text);margin-bottom:2px;letter-spacing:0.04em;
}
.modal-reading{font-size:11px;color:var(--dim);margin-bottom:16px}

.modal-fact{
  display:flex;gap:10px;padding:10px 0;
  border-top:1px dashed rgba(60,50,38,0.12);
}
.modal-fact:first-of-type{border-top:none;padding-top:4px}
.modal-fact-label{
  font-size:11px;color:var(--dim);letter-spacing:0.05em;
  flex-shrink:0;width:52px;line-height:1.7;
}
.modal-fact-val{
  flex:1;font-size:13px;color:var(--text);line-height:1.7;
}
.modal-fact-val strong{color:var(--gold);font-weight:500}

.modal-nakanoko{
  margin-top:14px;padding:12px 14px;
  background:rgba(60,50,38,0.05);border-radius:10px;
  font-family:var(--serif);font-size:13px;line-height:1.7;
  color:var(--soft);text-align:center;
}

/* ===== カレンダー画面 ===== */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;padding-top:4px;
}
.cal-title{
  font-family:var(--serif);font-size:22px;font-weight:700;color:var(--text);
  letter-spacing:0.05em;
}
.cal-sub{font-size:12px;color:var(--dim);margin-bottom:16px;text-align:center}

.cal-months{
  display:flex;flex-direction:column;gap:8px;
}
.cal-row{
  display:flex;align-items:flex-start;gap:8px;
  background:white;border-radius:8px;padding:10px 12px;
  border:1px solid rgba(60,50,38,0.06);
  min-height:44px;
}
.cal-row.current{
  border-color:var(--gold);background:var(--gold-bg);
}
.cal-row.empty{opacity:0.45}
.cal-month{
  font-family:var(--serif);font-size:16px;font-weight:700;
  color:var(--text);width:40px;flex-shrink:0;padding-top:2px;
}
.cal-row.current .cal-month{color:var(--gold)}
.cal-items{
  flex:1;display:flex;flex-wrap:wrap;gap:4px;
}
.cal-item{
  font-size:10px;padding:3px 7px;border-radius:5px;
  color:var(--text);background:rgba(60,50,38,0.08);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform 0.1s;white-space:nowrap;
}
.cal-item:active{transform:scale(0.95)}
.cal-empty-msg{font-size:11px;color:var(--dim);padding-top:4px}

/* カテゴリ別の色分け */
.cal-item.c-momo{background:rgba(196,117,110,0.2);color:#8a3c37}
.cal-item.c-ichigo{background:rgba(196,117,110,0.15);color:#a8453f}
.cal-item.c-kankitsu{background:rgba(212,168,83,0.2);color:#8a6a07}
.cal-item.c-budou{background:rgba(140,90,170,0.2);color:#6a4088}
.cal-item.c-ringo{background:rgba(196,117,110,0.25);color:#8a3c37}
.cal-item.c-nashi{background:rgba(212,200,150,0.35);color:#6b5a20}
.cal-item.c-youroshi{background:rgba(212,200,150,0.45);color:#6b5a20}
.cal-item.c-sakuranbo{background:rgba(196,60,60,0.2);color:#8a2020}
.cal-item.c-melon{background:rgba(90,138,74,0.2);color:#2d5a20}
.cal-item.c-sumomo{background:rgba(170,80,140,0.2);color:#6a1f4e}
.cal-item.c-kaki{background:rgba(200,120,60,0.25);color:#6b3c10}
.cal-item.c-ichijiku{background:rgba(120,80,60,0.2);color:#4a2c16}
.cal-item.c-mango{background:rgba(220,170,40,0.25);color:#6b4a04}
.cal-item.c-pine{background:rgba(220,190,60,0.25);color:#6b5a10}
.cal-item.c-ume{background:rgba(90,138,74,0.25);color:#2d5a20}
.cal-item.c-biwa{background:rgba(220,190,100,0.3);color:#6b5a20}
.cal-item.c-kiwi{background:rgba(100,150,70,0.25);color:#2d5a20}
.cal-item.c-blueberry{background:rgba(100,120,180,0.2);color:#243460}
.cal-item.c-anzu{background:rgba(230,160,80,0.25);color:#7a4010}
.cal-item.c-kuri{background:rgba(130,90,50,0.25);color:#4a2c0c}
.cal-item.c-suika{background:rgba(90,138,74,0.3);color:#2d5a20}
.cal-item.c-prune{background:rgba(140,90,170,0.2);color:#4a2060}
.cal-item.c-tropical{background:rgba(220,140,60,0.25);color:#6b3c10}
.cal-item.c-other{background:rgba(60,50,38,0.1);color:var(--text)}

/* ナビゲーションタブ */
.nav-tabs{
  display:flex;gap:6px;margin:12px 0 16px;
}
.nav-tab{

<div id="game">

</div>

var audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// 最初のタップでAudioContextをアンロック（iOS対策）
document.addEventListener('touchstart', function unlockAudio() {
  getCtx();
  startBgm();
  startTitleLidSound();
  document.removeEventListener('touchstart', unlockAudio);
}, { once: true });
document.addEventListener('click', function unlockAudio() {
  getCtx();
  startBgm();
  startTitleLidSound();
  document.removeEventListener('click', unlockAudio);
}, { once: true });

function playTone(freq, duration, type, vol, delay) {
  var ctx = getCtx();
  var t = ctx.currentTime + (delay || 0);
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol || 0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

// ===== BGM制御 =====
var bgmEl = null;
var bgmMuted = false;
var bgmStarted = false;

function initBgm() {
  bgmEl = document.getElementById('bgm');
  bgmEl.volume = 0.25;
  try {
    if (localStorage.getItem('frutti_muted') === '1') {
      bgmMuted = true;
      document.getElementById('mute-btn').textContent = '♪̸';
    }
  } catch(e) {}
}

function startBgm() {
  if (!bgmEl || bgmStarted || bgmMuted) return;
  bgmEl.play().then(function() {
    bgmStarted = true;
  }).catch(function(e) {});
}

function toggleMute() {
  bgmMuted = !bgmMuted;
  if (bgmEl) {
    if (bgmMuted) {
      bgmEl.pause();
    } else {
      bgmEl.play().catch(function(){});
      bgmStarted = true;
    }
  }
  document.getElementById('mute-btn').textContent = bgmMuted ? '♪̸' : '♪';
  try { localStorage.setItem('frutti_muted', bgmMuted ? '1' : '0'); } catch(e) {}
}

// ===== データ保存 =====
var SAVE = {
  hi: 0,           // ハイスコア
  plays: 0,        // プレイ回数
  collected: {}    // 正解した品種: {品種名: {c:カテゴリ, d:初獲得日}}
};

function loadSave() {
  try {
    var raw = localStorage.getItem('frutti_save');
    if (raw) {
      var d = JSON.parse(raw);
      SAVE.hi = d.hi || 0;
      SAVE.plays = d.plays || 0;
      SAVE.collected = d.collected || {};
    }
  } catch(e) {}
}

function saveSave() {
  try { localStorage.setItem('frutti_save', JSON.stringify(SAVE)); } catch(e) {}
}

function updateTitleStats() {
  var count = Object.keys(SAVE.collected).length;
  if (SAVE.plays > 0 || count > 0) {
    document.getElementById('stats-box').style.display = 'flex';
    document.getElementById('stat-hi').textContent = SAVE.hi;
    document.getElementById('stat-collected').textContent = count;
    document.getElementById('stat-total').textContent = GD.length;
    document.getElementById('stat-plays').textContent = SAVE.plays;
    if (count > 0) {
      document.getElementById('zukan-link').style.display = 'block';
      document.getElementById('cal-link').style.display = 'block';
    }
  }
}

// ===== 図鑑表示 =====
function showZukan() {
  sfxNext();
  showS('zukan');
  var body = document.getElementById('zukan-body');
  body.innerHTML = '';

  var allCats = getCats();
  var collectedTotal = Object.keys(SAVE.collected).length;

  document.getElementById('zukan-count').textContent =
    collectedTotal + ' / ' + GD.length + ' 品種';

  // カテゴリごとに集計
  for (var i = 0; i < allCats.length; i++) {
    var cat = allCats[i];
    var varieties = GD.filter(function(d) { return d.c === cat; });
    var collected = varieties.filter(function(v) { return SAVE.collected[v.n]; });

    if (collected.length === 0) continue; // 未獲得カテゴリは表示しない

    var div = document.createElement('div');
    div.className = 'zukan-cat fi';
    div.style.animationDelay = (i * 0.03) + 's';

    var head = '<div class="zukan-cat-head">'
      + '<div class="zukan-cat-name">' + cat + '</div>'
      + '<div class="zukan-cat-count">' + collected.length + ' / ' + varieties.length + '</div>'
      + '</div>';

    var list = '<div class="zukan-varieties">';
    for (var j = 0; j < varieties.length; j++) {
      var v = varieties[j];
      if (SAVE.collected[v.n]) {
        list += '<div class="zukan-v" data-name="' + v.n + '">' + v.n + '</div>';
      } else {
        list += '<div class="zukan-v locked">？？？</div>';
      }
    }
    list += '</div>';

    div.innerHTML = head + list;
    body.appendChild(div);
  }

  // イベント委譲：図鑑の品種クリックで詳細表示
  body.onclick = function(e) {
    var t = e.target;
    if (t && t.classList.contains('zukan-v') && !t.classList.contains('locked')) {
      var name = t.getAttribute('data-name');
      if (name) openVariety(name);
    }
  };

  // 未獲得のカテゴリがある場合の案内
  if (collectedTotal === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;line-height:1.8">'
      + '<span class="dot">……</span>まだ何も覚えてないな<br>'
      + 'ゲームで正解すると、ここに品種が集まっていく</div>';
  }
}

// カテゴリ名からCSSクラスへのマッピング
function catToClass(cat) {
  var map = {
    '桃': 'c-momo', 'ネクタリン': 'c-momo', 'ワッサー': 'c-momo',
    '苺': 'c-ichigo',
    '柑橘類': 'c-kankitsu',
    'ぶどう': 'c-budou',
    'りんご': 'c-ringo',
    '梨（和梨）': 'c-nashi',
    '洋梨': 'c-youroshi',
    'さくらんぼ': 'c-sakuranbo',
    'メロン': 'c-melon',
    'すもも・プラム': 'c-sumomo',
    '柿': 'c-kaki',
    'いちじく': 'c-ichijiku',
    'マンゴー': 'c-mango',
    'パイナップル': 'c-pine',
    '梅': 'c-ume',
    'びわ': 'c-biwa',
    'キウイ': 'c-kiwi',
    'ブルーベリー': 'c-blueberry',
    'あんず': 'c-anzu',
    '栗': 'c-kuri',
    'スイカ': 'c-suika',
    'プルーン': 'c-prune'
  };
  return map[cat] || 'c-tropical';
}

// ===== カレンダー表示 =====
function showCalendar() {
  sfxNext();
  showS('calendar');
  var body = document.getElementById('cal-body');
  body.innerHTML = '';

  var collectedNames = Object.keys(SAVE.collected);
  var collectedItems = GD.filter(function(d) { return SAVE.collected[d.n]; });
  var currentMonth = new Date().getMonth() + 1; // 1-12

  document.getElementById('cal-count').textContent =
    collectedItems.length + ' / ' + GD.length + ' 品種';

  // 現在の月の旬を先に計算
  var nowInSeason = collectedItems.filter(function(d) { return d.m === currentMonth; }).length;
  document.getElementById('cal-sub').innerHTML =
    '今は<strong style="color:var(--gold)">' + currentMonth + '月</strong>。'
    + (nowInSeason > 0 ? '今月が旬の出会った品種：' + nowInSeason + '種' : 'まだこの月に出会った品種はない');

  // 月ごとにグループ化
  var byMonth = {};
  for (var m = 1; m <= 12; m++) byMonth[m] = [];
  collectedItems.forEach(function(d) {
    byMonth[d.m].push(d);
  });

  // 月ごとにソート（旬の時期の文字列で並べる：上旬→中旬→下旬）
  for (var m = 1; m <= 12; m++) {
    byMonth[m].sort(function(a, b) {
      var order = {'上': 1, '中': 2, '下': 3};
      var aO = order[(a.p || '')[0]] || 0;
      var bO = order[(b.p || '')[0]] || 0;
      return aO - bO;
    });
  }

  // 12ヶ月の行を作成
  for (var m = 1; m <= 12; m++) {
    var row = document.createElement('div');
    row.className = 'cal-row fi';
    row.style.animationDelay = ((m - 1) * 0.03) + 's';
    if (m === currentMonth) row.classList.add('current');
    if (byMonth[m].length === 0) row.classList.add('empty');

    var monthDiv = '<div class="cal-month">' + m + '月</div>';

    var itemsHtml = '<div class="cal-items">';
    if (byMonth[m].length === 0) {
      itemsHtml += '<div class="cal-empty-msg"><span class="dot" style="color:var(--dim)">……</span></div>';
    } else {
      byMonth[m].forEach(function(d) {
        itemsHtml += '<div class="cal-item ' + catToClass(d.c) + '" data-name="' + d.n + '">'
          + d.n + '</div>';
      });
    }
    itemsHtml += '</div>';

    row.innerHTML = monthDiv + itemsHtml;
    body.appendChild(row);
  }

  // クリックで詳細
  body.onclick = function(e) {
    var t = e.target;
    if (t && t.classList.contains('cal-item')) {
      var name = t.getAttribute('data-name');
      if (name) openVariety(name);
    }
  };

  if (collectedItems.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--dim);padding:40px 20px;font-size:13px;line-height:1.8">'
      + '<span class="dot">……</span>まだ何も覚えてないな<br>'
      + 'ゲームで正解すると、旬の時期ごとに品種が並んでいく</div>';
  }
}

// ===== ゲームロジック =====

function getCats() {
  var c = {};
  for (var i = 0; i < GD.length; i++) c[GD[i].c] = 1;
  return Object.keys(c);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('db-c').textContent = getCats().length + 'カテゴリ / ' + GD.length + '品種';
  document.getElementById('img-title').src = IM.title;
  document.getElementById('img-title-closed').src = IM.title_closed;
  initBgm();
  loadSave();
  updateTitleStats();
  createDots();
});

// タイトル画面のピクセルドットを生成
function createDots() {
  var bg = document.getElementById('dots-bg');
  if (!bg) return;
  var colors = ['#b8860b', '#5a8a4a', '#6b5a46', '#b85450'];
  for (var i = 0; i < 12; i++) {
    var d = document.createElement('div');
    d.className = 'pixel-dot';
    d.style.left = (Math.random() * 100) + '%';
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    d.style.animationDelay = (Math.random() * 8) + 's';
    d.style.animationDuration = (6 + Math.random() * 4) + 's';
    bg.appendChild(d);
  }
}

// タイトル画面の蓋開閉音を定期的に鳴らす（CSSアニメの7秒周期に合わせる）
var titleLidTimer = null;
function startTitleLidSound() {
  if (titleLidTimer) return;
  // 開くタイミング：アニメ開始から60%地点=4.2秒、周期7秒
  // 最初は少し遅延させてからループ
  function schedule() {
    // 蓋が開く瞬間
    titleLidTimer = setTimeout(function() {
      if (document.getElementById('s-title').classList.contains('active')) {
        sfxLidOpen();
      }
      // 蓋が閉じる瞬間（+2.1秒後：90%→93%の地点）
      setTimeout(function() {
        if (document.getElementById('s-title').classList.contains('active')) {
          sfxClose();
        }
      }, 2100);
      schedule(); // 次の周期
    }, 7000);
  }
  // 初回：ユーザーのタップから4.2秒後に最初の開く音
  titleLidTimer = setTimeout(function() {
    if (document.getElementById('s-title').classList.contains('active')) {
      sfxLidOpen();
    }
    setTimeout(function() {
      if (document.getElementById('s-title').classList.contains('active')) {
        sfxClose();
      }
    }, 2100);
    schedule();
  }, 4200);
}

function stopTitleLidSound() {
  if (titleLidTimer) {
    clearTimeout(titleLidTimer);
    titleLidTimer = null;
  }
}

function showS(id) {
  var scenes = document.querySelectorAll('.scene');
  for (var i = 0; i < scenes.length; i++) scenes[i].classList.remove('active');
  setTimeout(function() { document.getElementById('s-' + id).classList.add('active'); }, 50);
  // タイトル以外に行くときは蓋音を止める、タイトルに戻るときは再開
  if (id === 'title') {
    stopTitleLidSound();
    startTitleLidSound();
  } else {
    stopTitleLidSound();
  }
}

function showTitle() { showS('title'); }

function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

function startGame() {
  sfxStart();
  var sh = GD.slice().sort(function() { return Math.random() - 0.5; });
  var sel = [], uc = {};
  for (var i = 0; i < sh.length && sel.length < 5; i++) {
    if (!uc[sh[i].c]) { sel.push(sh[i]); uc[sh[i].c] = 1; }
  }
  for (var i = 0; i < sh.length && sel.length < 5; i++) {
    if (sel.indexOf(sh[i]) === -1) sel.push(sh[i]);
  }
  S = {q: sel, cur: 0, sc: 0, res: [], hCat: false, hSea: false, _newThisRound: {}};
  showCat();
}

function openSpeech(n) {
  return pick([
    '<span class="dot">……</span>' + n,
    '<span class="dot">……</span>' + n + '。知ってるか',
    '<span class="dot">……</span>' + n + '、だ',
    '<span class="dot">……</span>' + n + '。さて'
  ]);
}

function updProg(id) {
  var d = document.getElementById(id);
  d.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var dot = document.createElement('div');
    dot.className = 'prog-dot';
    if (i < S.cur) {
      var r = S.res[i];
      dot.classList.add(r && r.catOk ? 'ok' : 'ng');
    } else if (i === S.cur) {
      dot.classList.add('cur');
    }
    d.appendChild(dot);
  }
}

function showCat() {
  showS('cat');
  sfxLidOpen();
  var it = S.q[S.cur];
  S.hCat = false;
  updProg('pr1');
  document.getElementById('sc1').textContent = S.sc;
  document.getElementById('img-cat').src = IM.normal;
  document.getElementById('img-cat').className = '';
  document.getElementById('sp-cat').innerHTML = openSpeech(it.n);
  document.getElementById('vn').textContent = it.n;
  document.getElementById('vr').textContent = it.r;

  var cor = it.c;
  var allC = getCats().filter(function(c) { return c !== cor; });
  allC.sort(function() { return Math.random() - 0.5; });
  var ch = [cor].concat(allC.slice(0, 3)).sort(function() { return Math.random() - 0.5; });

  var cd = document.getElementById('cc');
  cd.innerHTML = '';
  for (var i = 0; i < ch.length; i++) {
    (function(cat) {
      var b = document.createElement('button');
      b.className = 'ch-btn';
      b.textContent = cat;
      b.onclick = function() { ansCat(b, cat, cor, it); };
      cd.appendChild(b);
    })(ch[i]);
  }

  var hb = document.getElementById('hb-cat');
  hb.disabled = false;
  hb.textContent = 'なかの子にきく（-30pt）';
}

function ansCat(btn, sel, cor, it) {
  var bs = document.querySelectorAll('#cc .ch-btn');
  for (var i = 0; i < bs.length; i++) bs[i].classList.add('dis');

  if (sel === cor) {
    btn.classList.add('correct');
    sfxCorrect();
    // 図鑑に追加
    var isNew = !SAVE.collected[it.n];
    if (isNew) {
      SAVE.collected[it.n] = {c: it.c, d: new Date().toISOString().slice(0,10)};
      if (!S._newThisRound) S._newThisRound = {};
      S._newThisRound[it.n] = true;
    }
    document.getElementById('img-cat').src = IM.correct;
    document.getElementById('img-cat').className = 'big pop';
    var pts = it.d * 100 - (S.hCat ? 30 : 0);
    S.sc += Math.max(pts, 0);
    document.getElementById('sp-cat').innerHTML = pick([
      '<span class="dot">……</span>知ってたか',
      '<span class="dot">……</span>ほう',
      '<span class="dot">……</span>わかるじゃないか',
      '<span class="dot">……</span>そうだ'
    ]);
    setTimeout(function() { showSeason(it); }, 1200);
  } else {
    btn.classList.add('wrong');
    sfxWrong();
    document.getElementById('img-cat').src = IM.wrong;
    document.getElementById('img-cat').className = 'small shake';
    for (var i = 0; i < bs.length; i++) {
      if (bs[i].textContent === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-cat').innerHTML = pick([
      '<span class="dot">……</span>違うぞ。' + cor + 'だ',
      '<span class="dot">……</span>' + cor + 'だ。覚えとけ',
      '<span class="dot">……</span>まぁ、' + cor + 'だな'
    ]);
    S.res.push({item: it, catOk: false, seaOk: null, pts: 0});
    var nb = document.createElement('button');
    nb.className = 'nxt-btn fi';
    nb.textContent = S.cur < 4 ? '次の品種へ' : '結果を見る';
    nb.onclick = function() { sfxNext(); S.cur++; if (S.cur >= 5) showResult(); else showCat(); };
    document.getElementById('cc').appendChild(nb);
  }
  document.getElementById('sc1').textContent = S.sc;
}

function showSeason(it) {
  showS('season');
  sfxSeason();
  S.hSea = false;
  updProg('pr2');
  document.getElementById('sc2').textContent = S.sc;
  document.getElementById('img-sea').src = IM.normal;
  document.getElementById('img-sea').className = '';
  document.getElementById('sp-sea').innerHTML = '<span class="dot">……</span>じゃあ、' + it.n + 'の旬はいつだ';
  document.getElementById('vn2').textContent = it.n;
  document.getElementById('vc2').textContent = it.c;

  var g = document.getElementById('mg');
  g.innerHTML = '';
  for (var m = 1; m <= 12; m++) {
    (function(month) {
      var b = document.createElement('button');
      b.className = 'm-btn';
      b.textContent = month + '月';
      b.onclick = function() { ansSea(b, month, it); };
      g.appendChild(b);
    })(m);
  }

  var hb = document.getElementById('hb-sea');
  hb.disabled = false;
  hb.textContent = 'なかの子にきく（-30pt）';
}

function ansSea(btn, sel, it) {
  var bs = document.querySelectorAll('#mg .m-btn');
  for (var i = 0; i < bs.length; i++) bs[i].classList.add('dis');

  var cor = it.m;
  var diff = Math.abs(sel - cor);
  var cd = Math.min(diff, 12 - diff);
  var pts = 0, rt = 'wrong';

  if (sel === cor) {
    btn.classList.add('correct');
    sfxCorrect();
    pts = it.d * 100 - (S.hSea ? 30 : 0);
    rt = 'correct';
    document.getElementById('img-sea').src = IM.correct;
    document.getElementById('img-sea').className = 'big pop';
    document.getElementById('sp-sea').innerHTML = pick([
      '<span class="dot">……</span>わかってるじゃないか',
      '<span class="dot">……</span>そうだ。' + it.p + 'だ',
      '<span class="dot">……</span>正解。' + cor + '月の' + it.p
    ]);
  } else if (cd <= 1) {
    btn.classList.add('close');
    sfxHint();
    pts = Math.floor(it.d * 50) - (S.hSea ? 30 : 0);
    rt = 'partial';
    document.getElementById('img-sea').src = IM.normal;
    for (var i = 0; i < bs.length; i++) {
      if (i + 1 === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-sea').innerHTML = '<span class="dot">……</span>惜しいな。' + cor + '月の' + it.p + 'だ';
  } else {
    btn.classList.add('wrong');
    sfxWrong();
    document.getElementById('img-sea').src = IM.wrong;
    document.getElementById('img-sea').className = 'small shake';
    for (var i = 0; i < bs.length; i++) {
      if (i + 1 === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-sea').innerHTML = pick([
      '<span class="dot">……</span>全然違う。' + cor + '月だ',
      '<span class="dot">……</span>' + cor + '月の' + it.p + 'だ。覚えとけ'
    ]);
  }

  pts = Math.max(pts, 0);
  S.sc += pts;
  var cPts = it.d * 100 - (S.hCat ? 30 : 0);
  // isNewフラグ：showResultで結果表示時に使う
  var wasNew = !!S._newThisRound && S._newThisRound[it.n];
  S.res.push({item: it, catOk: true, seaOk: rt, pts: Math.max(cPts, 0) + pts, isNew: wasNew});
  document.getElementById('sc2').textContent = S.sc;

  var info = document.createElement('div');
  info.className = 's-info fi';
  info.innerHTML = '<strong>' + it.n + '</strong>の旬は<strong>' + cor + '月' + it.p + '</strong>';
  document.getElementById('mg').after(info);

  var nb = document.createElement('button');
  nb.className = 'nxt-btn fi2';
  nb.textContent = S.cur < 4 ? '次の品種へ' : '結果を見る';
  nb.onclick = function() { sfxNext(); S.cur++; if (S.cur >= 5) showResult(); else showCat(); };
  info.after(nb);
}

function doHint(type) {
  var it = S.q[S.cur];
  sfxHint();
  if (type === 'cat') {
    S.hCat = true;
    document.getElementById('sp-cat').innerHTML = it.h;
    document.getElementById('img-cat').src = IM.hint;
    document.getElementById('img-cat').className = '';
    var b = document.getElementById('hb-cat');
    b.disabled = true;
    b.textContent = 'ヒント済み';
  } else {
    S.hSea = true;
    document.getElementById('sp-sea').innerHTML = it.h;
    document.getElementById('img-sea').src = IM.hint;
    document.getElementById('img-sea').className = '';
    var b = document.getElementById('hb-sea');
    b.disabled = true;
    b.textContent = 'ヒント済み';
  }
}

function showResult() {
  showS('result');
  sfxResult();
  var cc = 0, pc = 0;
  for (var i = 0; i < S.res.length; i++) {
    if (S.res[i].catOk) cc++;
    if (S.res[i].catOk && S.res[i].seaOk === 'correct') pc++;
  }

  // ハイスコア更新＆プレイ回数＋1＆保存
  SAVE.plays++;
  var newHi = false;
  if (S.sc > SAVE.hi) {
    SAVE.hi = S.sc;
    newHi = true;
  }
  saveSave();

  var cm;
  if (pc >= 4) cm = '<span class="dot">……</span>なかなかやるじゃないか';
  else if (cc >= 4) cm = '<span class="dot">……</span>悪くない。旬はもう少しだな';
  else if (cc >= 2) cm = '<span class="dot">……</span>まぁ、これから覚えればいい';
  else cm = '<span class="dot">……</span>果物のこと、もっと知ってやれよ';

  if (newHi && SAVE.plays > 1) cm += '<br><span style="color:var(--gold);font-size:12px">ハイスコア更新</span>';

  var newCount = Object.keys(S._newThisRound || {}).length;
  if (newCount > 0) {
    cm += '<br><span style="color:var(--gold);font-size:12px">' + newCount + '品種が図鑑に追加された</span>';
  }

  document.getElementById('sp-res').innerHTML = cm;
  document.getElementById('img-res').src = pc >= 3 ? IM.correct : cc >= 3 ? IM.normal : IM.wrong;
  document.getElementById('img-res').className = pc >= 3 ? 'big' : '';
  document.getElementById('fs').textContent = S.sc;

  var dl = ['', 'やさしい', 'ふつう', 'むずかしい', 'マニア'];
  var dd = document.getElementById('rd');
  dd.innerHTML = '';

  for (var i = 0; i < S.res.length; i++) {
    var r = S.res[i];
    var d = document.createElement('div');
    d.className = 'r-item fi';
    d.style.animationDelay = (i * 0.08) + 's';

    var ic, it;
    if (r.catOk && r.seaOk === 'correct') { ic = 'ok'; it = '◎'; }
    else if (r.catOk && r.seaOk === 'partial') { ic = 'pt'; it = '○'; }
    else if (r.catOk) { ic = 'pt'; it = '△'; }
    else { ic = 'ng'; it = '×'; }

    var newTag = r.isNew ? '<span class="r-new">NEW</span>' : '';

    d.innerHTML = '<div class="r-icon ' + ic + '">' + it + '</div>'
      + '<div class="r-info"><div class="r-name">' + r.item.n + newTag
      + ' <span class="diff d' + r.item.d + '">' + dl[r.item.d] + '</span></div>'
      + '<div class="r-ans">' + r.item.c + ' / ' + r.item.m + '月' + r.item.p + '</div></div>'
      + '<div class="r-pts">+' + r.pts + '</div>';

    // クリックで詳細を開く
    (function(varName) {
      d.onclick = function() { openVariety(varName); };
    })(r.item.n);

    dd.appendChild(d);
  }

  // タイトル画面の統計も更新しておく（次にタイトルに戻ったとき最新を表示）
  updateTitleStats();
}

// ===== 品種詳細モーダル =====
function openVariety(name) {
  sfxHint();
  var item = null;
  for (var i = 0; i < GD.length; i++) {
    if (GD[i].n === name) { item = GD[i]; break; }
  }
  if (!item) return;

  document.getElementById('m-cat').textContent = item.c;
  document.getElementById('m-name').textContent = item.n;
  document.getElementById('m-reading').textContent = item.r;
  document.getElementById('m-season').innerHTML = '<strong>' + item.m + '月</strong>（' + item.p + '）';
  document.getElementById('m-region').textContent = item.mr || '-';
  document.getElementById('m-chars').textContent = item.x;
  document.getElementById('m-nakanoko').innerHTML = '<span class="dot" style="color:var(--dim)">……</span>' + item.h.replace(/^…+/, '');

  document.getElementById('modal').classList.add('active');
}

function closeModal(e) {
  // オーバーレイ自体、または閉じるボタンのクリックのみ閉じる
  if (e && e.target && e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('active');
  } else if (!e) {
    // 引数なしで呼ばれた場合（閉じるボタン）
    document.getElementById('modal').classList.remove('active');
  }
}
