<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frutti</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4ead5;--bg2:#ede1c9;--card:rgba(60,50,38,0.06);
  --card-h:rgba(60,50,38,0.12);--text:#3d3226;--soft:#6b5a46;
  --dim:#9a8872;--green:#5a8a4a;--green-bg:rgba(90,138,74,0.12);
  --red:#b85450;--red-bg:rgba(184,84,80,0.1);
  --gold:#b8860b;--gold-bg:rgba(184,134,11,0.12);
  --serif:'Noto Serif JP',serif;--sans:'Zen Kaku Gothic New',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body{display:flex;justify-content:center;padding:0}
#game{width:100%;max-width:420px;min-height:100dvh;padding:16px 16px 32px;position:relative}
.scene{display:none;opacity:0;transition:opacity 0.4s}.scene.active{display:block;opacity:1}

.nakanoko{text-align:center;margin:0 auto 8px;position:relative}
.nakanoko img{max-width:200px;height:auto;border-radius:8px;transition:all 0.5s ease}
.nakanoko img.big{max-width:240px}
.nakanoko img.small{max-width:140px}
.nakanoko img.title-img{max-width:320px;border-radius:12px}

.speech{
  font-family:var(--serif);color:var(--soft);font-size:14px;
  line-height:1.8;text-align:center;min-height:2.8em;
  padding:8px 16px;margin:0 auto 16px;max-width:320px;
}
.speech .dot{color:var(--dim)}

.var-name{
  font-family:var(--serif);font-size:28px;font-weight:700;
  color:var(--text);text-align:center;margin:16px 0 4px;letter-spacing:0.04em;
}
.var-reading{font-size:12px;color:var(--dim);text-align:center;margin-bottom:20px}
.q-label{font-size:13px;color:var(--dim);text-align:center;margin-bottom:12px;letter-spacing:0.05em}

.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ch-btn{
  background:white;border:1px solid rgba(60,50,38,0.12);border-radius:10px;
  padding:13px 18px;color:var(--text);font-family:var(--sans);font-size:15px;
  font-weight:500;cursor:pointer;transition:all 0.15s;text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.ch-btn:active{transform:scale(0.98)}
.ch-btn:hover{background:var(--bg2);border-color:rgba(60,50,38,0.2)}
.ch-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.ch-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.ch-btn.dis{pointer-events:none;opacity:0.45}
.ch-btn.show{border-color:var(--green);opacity:0.6}

.m-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:16px}
.m-btn{
  background:white;border:1px solid rgba(60,50,38,0.12);border-radius:8px;
  padding:11px 6px;color:var(--text);font-family:var(--sans);font-size:14px;
  font-weight:500;cursor:pointer;transition:all 0.15s;text-align:center;
  -webkit-tap-highlight-color:transparent;
}
.m-btn:active{transform:scale(0.95)}
.m-btn.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.m-btn.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.m-btn.close{background:var(--gold-bg);border-color:var(--gold);color:var(--gold)}
.m-btn.dis{pointer-events:none;opacity:0.45}
.m-btn.show{border-color:var(--green);opacity:0.6}

.hint-area{text-align:center;margin-top:4px}
.hint-btn{
  background:none;border:1px dashed var(--dim);border-radius:20px;
  padding:7px 18px;color:var(--dim);font-size:12px;cursor:pointer;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.hint-btn:hover{border-color:var(--soft);color:var(--soft)}
.hint-btn:disabled{opacity:0.3;cursor:default}

.prog{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
.prog-dot{
  width:8px;height:8px;border-radius:50%;background:rgba(60,50,38,0.1);
  border:1px solid var(--dim);transition:all 0.3s;
}
.prog-dot.ok{background:var(--green);border-color:var(--green)}
.prog-dot.ng{background:var(--red);border-color:var(--red)}
.prog-dot.cur{background:var(--gold);border-color:var(--gold);transform:scale(1.3)}

.sc-disp{text-align:right;font-size:12px;color:var(--dim);margin-bottom:12px}
.sc-disp span{color:var(--gold);font-weight:700}

.nxt-btn{
  display:block;width:100%;background:white;border:1px solid rgba(60,50,38,0.15);
  border-radius:10px;padding:14px;color:var(--text);font-family:var(--sans);
  font-size:15px;font-weight:500;cursor:pointer;transition:all 0.15s;margin-top:16px;
  -webkit-tap-highlight-color:transparent;
}
.nxt-btn:hover{background:var(--bg2)}

.title-top{text-align:center;padding-top:24px;margin-bottom:16px}
.title-label{font-size:10px;color:var(--dim);letter-spacing:0.15em;margin-bottom:12px}
.title-main{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--text);letter-spacing:0.08em;margin-bottom:4px}
.title-sub{font-size:13px;color:var(--dim)}

.start-btn{
  display:block;width:100%;background:var(--text);border:none;border-radius:12px;
  padding:16px;color:var(--bg);font-family:var(--serif);font-size:16px;
  font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.08em;
  -webkit-tap-highlight-color:transparent;
}
.start-btn:hover{opacity:0.85}
.start-btn:active{transform:scale(0.98)}

.howto{
  margin:16px 0;padding:14px 16px;background:rgba(60,50,38,0.04);
  border-radius:10px;font-size:13px;line-height:1.8;color:var(--soft);
}
.howto p{margin-bottom:6px}.howto p:last-child{margin-bottom:0}
.db-c{text-align:center;font-size:11px;color:var(--dim);margin-top:12px;opacity:0.6}

.r-header{text-align:center;margin-bottom:24px;padding-top:8px}
.r-score{font-family:var(--serif);font-size:44px;font-weight:700;color:var(--gold);margin:4px 0}
.r-label{font-size:12px;color:var(--dim)}

.r-item{
  background:white;border-radius:8px;padding:12px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:10px;border:1px solid rgba(60,50,38,0.06);
}
.r-icon{
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:12px;flex-shrink:0;
}
.r-icon.ok{background:var(--green-bg);color:var(--green)}
.r-icon.ng{background:var(--red-bg);color:var(--red)}
.r-icon.pt{background:var(--gold-bg);color:var(--gold)}
.r-info{flex:1;min-width:0}
.r-name{font-weight:500;font-size:13px;color:var(--text)}
.r-ans{font-size:11px;color:var(--dim);margin-top:2px}
.r-pts{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.s-info{font-size:12px;color:var(--soft);text-align:center;margin-top:8px;line-height:1.6}
.s-info strong{color:var(--gold);font-weight:500}
.diff{display:inline-block;font-size:9px;padding:2px 6px;border-radius:8px;margin-left:4px;vertical-align:middle}
.d1{background:var(--green-bg);color:var(--green)}
.d2{background:var(--gold-bg);color:var(--gold)}
.d3{background:var(--red-bg);color:var(--red)}
.d4{background:rgba(140,90,170,0.12);color:#8c5aaa}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeUp 0.35s ease-out forwards}
.fi2{animation:fadeUp 0.35s ease-out 0.12s forwards;opacity:0}
.fi3{animation:fadeUp 0.35s ease-out 0.24s forwards;opacity:0}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake 0.3s ease-in-out}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop 0.3s ease-out}
</style>
</head>
<body>
<div id="game">

<div id="s-title" class="scene active">
  <div class="title-top fi">
    <div class="title-label">SINCERITA presents</div>
    <div class="title-main">Frutti</div>
    <div class="title-sub">果物の品種と旬を当てるゲーム</div>
  </div>
  <div class="nakanoko fi2"><img src="" id="img-title" class="title-img" alt="なかの子"></div>
  <div class="speech fi2"><span class="dot">……</span>暇だな。果物の話でもするか</div>
  <div class="howto fi2">
    <p>品種の名前を聞いて、何の果物かを当てる。当たったら、旬の月を当てる。</p>
    <p>迷ったら、なかの子にヒントをもらえる。ただしポイントが少し減る。</p>
    <p>全5問。難しい品種ほどポイントが高い。</p>
  </div>
  <button class="start-btn fi3" onclick="startGame()">はじめる</button>
  <div class="db-c fi3" id="db-c"></div>
</div>

<div id="s-cat" class="scene">
  <div class="prog" id="pr1"></div>
  <div class="sc-disp">pt：<span id="sc1">0</span></div>
  <div class="nakanoko"><img src="" id="img-cat" alt="なかの子"></div>
  <div class="speech" id="sp-cat"><span class="dot">……</span></div>
  <div class="var-name" id="vn"></div>
  <div class="var-reading" id="vr"></div>
  <div class="q-label">何の果物だ？</div>
  <div class="choices" id="cc"></div>
  <div class="hint-area"><button class="hint-btn" id="hb-cat" onclick="doHint('cat')">なかの子にきく（-30pt）</button></div>
</div>

<div id="s-season" class="scene">
  <div class="prog" id="pr2"></div>
  <div class="sc-disp">pt：<span id="sc2">0</span></div>
  <div class="nakanoko"><img src="" id="img-sea" alt="なかの子"></div>
  <div class="speech" id="sp-sea"><span class="dot">……</span></div>
  <div class="var-name" id="vn2" style="font-size:22px"></div>
  <div class="var-reading" id="vc2"></div>
  <div class="q-label">旬はいつだ？</div>
  <div class="m-grid" id="mg"></div>
  <div class="hint-area"><button class="hint-btn" id="hb-sea" onclick="doHint('sea')">なかの子にきく（-30pt）</button></div>
</div>

<div id="s-result" class="scene">
  <div class="r-header">
    <div class="nakanoko"><img src="" id="img-res" alt="なかの子"></div>
    <div class="speech" id="sp-res"></div>
    <div class="r-label">あなたのポイント</div>
    <div class="r-score" id="fs">0</div>
  </div>
  <div id="rd"></div>
  <button class="nxt-btn" onclick="startGame()">もう一回</button>
  <button class="nxt-btn" style="margin-top:6px;background:none;border-color:rgba(60,50,38,0.08)" onclick="showTitle()">タイトルに戻る</button>
</div>

</div>

<script>

var audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, vol, delay) {
  var ctx = getCtx();
  var t = ctx.currentTime + (delay || 0);
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol || 0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function sfxLidOpen() {
  playTone(200, 0.06, 'square', 0.06);
  playTone(400, 0.08, 'square', 0.05, 0.05);
  playTone(600, 0.06, 'square', 0.03, 0.1);
}

// ===== ゲームロジック =====

function getCats() {
  var c = {};
  for (var i = 0; i < GD.length; i++) c[GD[i].c] = 1;
  return Object.keys(c);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('db-c').textContent = getCats().length + 'カテゴリ / ' + GD.length + '品種';
  document.getElementById('img-title').src = IM.title;
});

function showS(id) {
  var scenes = document.querySelectorAll('.scene');
  for (var i = 0; i < scenes.length; i++) scenes[i].classList.remove('active');
  setTimeout(function() { document.getElementById('s-' + id).classList.add('active'); }, 50);
}

function showTitle() { showS('title'); }

function pick(a) { return a[Math.floor(Math.random() * a.length)]; }

function startGame() {
  sfxStart();
  var sh = GD.slice().sort(function() { return Math.random() - 0.5; });
  var sel = [], uc = {};
  for (var i = 0; i < sh.length && sel.length < 5; i++) {
    if (!uc[sh[i].c]) { sel.push(sh[i]); uc[sh[i].c] = 1; }
  }
  for (var i = 0; i < sh.length && sel.length < 5; i++) {
    if (sel.indexOf(sh[i]) === -1) sel.push(sh[i]);
  }
  S = {q: sel, cur: 0, sc: 0, res: [], hCat: false, hSea: false};
  showCat();
}

function openSpeech(n) {
  return pick([
    '<span class="dot">……</span>' + n,
    '<span class="dot">……</span>' + n + '。知ってるか',
    '<span class="dot">……</span>' + n + '、だ',
    '<span class="dot">……</span>' + n + '。さて'
  ]);
}

function updProg(id) {
  var d = document.getElementById(id);
  d.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var dot = document.createElement('div');
    dot.className = 'prog-dot';
    if (i < S.cur) {
      var r = S.res[i];
      dot.classList.add(r && r.catOk ? 'ok' : 'ng');
    } else if (i === S.cur) {
      dot.classList.add('cur');
    }
    d.appendChild(dot);
  }
}

function showCat() {
  showS('cat');
  sfxLidOpen();
  var it = S.q[S.cur];
  S.hCat = false;
  updProg('pr1');
  document.getElementById('sc1').textContent = S.sc;
  document.getElementById('img-cat').src = IM.normal;
  document.getElementById('img-cat').className = '';
  document.getElementById('sp-cat').innerHTML = openSpeech(it.n);
  document.getElementById('vn').textContent = it.n;
  document.getElementById('vr').textContent = it.r;

  var cor = it.c;
  var allC = getCats().filter(function(c) { return c !== cor; });
  allC.sort(function() { return Math.random() - 0.5; });
  var ch = [cor].concat(allC.slice(0, 3)).sort(function() { return Math.random() - 0.5; });

  var cd = document.getElementById('cc');
  cd.innerHTML = '';
  for (var i = 0; i < ch.length; i++) {
    (function(cat) {
      var b = document.createElement('button');
      b.className = 'ch-btn';
      b.textContent = cat;
      b.onclick = function() { ansCat(b, cat, cor, it); };
      cd.appendChild(b);
    })(ch[i]);
  }

  var hb = document.getElementById('hb-cat');
  hb.disabled = false;
  hb.textContent = 'なかの子にきく（-30pt）';
}

function ansCat(btn, sel, cor, it) {
  var bs = document.querySelectorAll('#cc .ch-btn');
  for (var i = 0; i < bs.length; i++) bs[i].classList.add('dis');

  if (sel === cor) {
    btn.classList.add('correct');
    sfxCorrect();
    document.getElementById('img-cat').src = IM.correct;
    document.getElementById('img-cat').className = 'big pop';
    var pts = it.d * 100 - (S.hCat ? 30 : 0);
    S.sc += Math.max(pts, 0);
    document.getElementById('sp-cat').innerHTML = pick([
      '<span class="dot">……</span>知ってたか',
      '<span class="dot">……</span>ほう',
      '<span class="dot">……</span>わかるじゃないか',
      '<span class="dot">……</span>そうだ'
    ]);
    setTimeout(function() { showSeason(it); }, 1200);
  } else {
    btn.classList.add('wrong');
    sfxWrong();
    document.getElementById('img-cat').src = IM.wrong;
    document.getElementById('img-cat').className = 'small shake';
    for (var i = 0; i < bs.length; i++) {
      if (bs[i].textContent === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-cat').innerHTML = pick([
      '<span class="dot">……</span>違うぞ。' + cor + 'だ',
      '<span class="dot">……</span>' + cor + 'だ。覚えとけ',
      '<span class="dot">……</span>まぁ、' + cor + 'だな'
    ]);
    S.res.push({item: it, catOk: false, seaOk: null, pts: 0});
    var nb = document.createElement('button');
    nb.className = 'nxt-btn fi';
    nb.textContent = S.cur < 4 ? '次の品種へ' : '結果を見る';
    nb.onclick = function() { sfxNext(); S.cur++; if (S.cur >= 5) showResult(); else showCat(); };
    document.getElementById('cc').appendChild(nb);
  }
  document.getElementById('sc1').textContent = S.sc;
}

function showSeason(it) {
  showS('season');
  sfxSeason();
  S.hSea = false;
  updProg('pr2');
  document.getElementById('sc2').textContent = S.sc;
  document.getElementById('img-sea').src = IM.normal;
  document.getElementById('img-sea').className = '';
  document.getElementById('sp-sea').innerHTML = '<span class="dot">……</span>じゃあ、' + it.n + 'の旬はいつだ';
  document.getElementById('vn2').textContent = it.n;
  document.getElementById('vc2').textContent = it.c;

  var g = document.getElementById('mg');
  g.innerHTML = '';
  for (var m = 1; m <= 12; m++) {
    (function(month) {
      var b = document.createElement('button');
      b.className = 'm-btn';
      b.textContent = month + '月';
      b.onclick = function() { ansSea(b, month, it); };
      g.appendChild(b);
    })(m);
  }

  var hb = document.getElementById('hb-sea');
  hb.disabled = false;
  hb.textContent = 'なかの子にきく（-30pt）';
}

function ansSea(btn, sel, it) {
  var bs = document.querySelectorAll('#mg .m-btn');
  for (var i = 0; i < bs.length; i++) bs[i].classList.add('dis');

  var cor = it.m;
  var diff = Math.abs(sel - cor);
  var cd = Math.min(diff, 12 - diff);
  var pts = 0, rt = 'wrong';

  if (sel === cor) {
    btn.classList.add('correct');
    sfxCorrect();
    pts = it.d * 100 - (S.hSea ? 30 : 0);
    rt = 'correct';
    document.getElementById('img-sea').src = IM.correct;
    document.getElementById('img-sea').className = 'big pop';
    document.getElementById('sp-sea').innerHTML = pick([
      '<span class="dot">……</span>わかってるじゃないか',
      '<span class="dot">……</span>そうだ。' + it.p + 'だ',
      '<span class="dot">……</span>正解。' + cor + '月の' + it.p
    ]);
  } else if (cd <= 1) {
    btn.classList.add('close');
    sfxHint();
    pts = Math.floor(it.d * 50) - (S.hSea ? 30 : 0);
    rt = 'partial';
    document.getElementById('img-sea').src = IM.normal;
    for (var i = 0; i < bs.length; i++) {
      if (i + 1 === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-sea').innerHTML = '<span class="dot">……</span>惜しいな。' + cor + '月の' + it.p + 'だ';
  } else {
    btn.classList.add('wrong');
    sfxWrong();
    document.getElementById('img-sea').src = IM.wrong;
    document.getElementById('img-sea').className = 'small shake';
    for (var i = 0; i < bs.length; i++) {
      if (i + 1 === cor) bs[i].classList.add('show');
    }
    document.getElementById('sp-sea').innerHTML = pick([
      '<span class="dot">……</span>全然違う。' + cor + '月だ',
      '<span class="dot">……</span>' + cor + '月の' + it.p + 'だ。覚えとけ'
    ]);
  }

  pts = Math.max(pts, 0);
  S.sc += pts;
  var cPts = it.d * 100 - (S.hCat ? 30 : 0);
  S.res.push({item: it, catOk: true, seaOk: rt, pts: Math.max(cPts, 0) + pts});
  document.getElementById('sc2').textContent = S.sc;

  var info = document.createElement('div');
  info.className = 's-info fi';
  info.innerHTML = '<strong>' + it.n + '</strong>の旬は<strong>' + cor + '月' + it.p + '</strong>';
  document.getElementById('mg').after(info);

  var nb = document.createElement('button');
  nb.className = 'nxt-btn fi2';
  nb.textContent = S.cur < 4 ? '次の品種へ' : '結果を見る';
  nb.onclick = function() { sfxNext(); S.cur++; if (S.cur >= 5) showResult(); else showCat(); };
  info.after(nb);
}

function doHint(type) {
  var it = S.q[S.cur];
  sfxHint();
  if (type === 'cat') {
    S.hCat = true;
    document.getElementById('sp-cat').innerHTML = it.h;
    document.getElementById('img-cat').src = IM.hint;
    document.getElementById('img-cat').className = '';
    var b = document.getElementById('hb-cat');
    b.disabled = true;
    b.textContent = 'ヒント済み';
  } else {
    S.hSea = true;
    document.getElementById('sp-sea').innerHTML = it.h;
    document.getElementById('img-sea').src = IM.hint;
    document.getElementById('img-sea').className = '';
    var b = document.getElementById('hb-sea');
    b.disabled = true;
    b.textContent = 'ヒント済み';
  }
}

function showResult() {
  showS('result');
  sfxResult();
  var cc = 0, pc = 0;
  for (var i = 0; i < S.res.length; i++) {
    if (S.res[i].catOk) cc++;
    if (S.res[i].catOk && S.res[i].seaOk === 'correct') pc++;
  }

  var cm;
  if (pc >= 4) cm = '<span class="dot">……</span>なかなかやるじゃないか';
  else if (cc >= 4) cm = '<span class="dot">……</span>悪くない。旬はもう少しだな';
  else if (cc >= 2) cm = '<span class="dot">……</span>まぁ、これから覚えればいい';
  else cm = '<span class="dot">……</span>果物のこと、もっと知ってやれよ';

  document.getElementById('sp-res').innerHTML = cm;
  document.getElementById('img-res').src = pc >= 3 ? IM.correct : cc >= 3 ? IM.normal : IM.wrong;
  document.getElementById('img-res').className = pc >= 3 ? 'big' : '';
  document.getElementById('fs').textContent = S.sc;

  var dl = ['', 'やさしい', 'ふつう', 'むずかしい', 'マニア'];
  var dd = document.getElementById('rd');
  dd.innerHTML = '';

  for (var i = 0; i < S.res.length; i++) {
    var r = S.res[i];
    var d = document.createElement('div');
    d.className = 'r-item fi';
    d.style.animationDelay = (i * 0.08) + 's';

    var ic, it;
    if (r.catOk && r.seaOk === 'correct') { ic = 'ok'; it = '◎'; }
    else if (r.catOk && r.seaOk === 'partial') { ic = 'pt'; it = '○'; }
    else if (r.catOk) { ic = 'pt'; it = '△'; }
    else { ic = 'ng'; it = '×'; }

    d.innerHTML = '<div class="r-icon ' + ic + '">' + it + '</div>'
      + '<div class="r-info"><div class="r-name">' + r.item.n
      + ' <span class="diff d' + r.item.d + '">' + dl[r.item.d] + '</span></div>'
      + '<div class="r-ans">' + r.item.c + ' / ' + r.item.m + '月' + r.item.p + '</div></div>'
      + '<div class="r-pts">+' + r.pts + '</div>';
    dd.appendChild(d);
  }
}
</script>
</body>
